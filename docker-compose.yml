version: '3.9'

services:
  # Main web application
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
      - NEXT_PUBLIC_PDF_ENGINE_URL=http://pdf-engine:3001
    depends_on:
      - api-gateway
      - pdf-engine
    networks:
      - open-pdf-network
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src

  # Go API Gateway
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "9999:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://openpdf:openpdf@postgres:5432/openpdf
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - open-pdf-network
    develop:
      watch:
        - action: rebuild
          path: ./apps/api-gateway

  # Rust PDF Engine
  pdf-engine:
    build:
      context: ./apps/pdf-engine
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - RUST_LOG=info
    networks:
      - open-pdf-network
    develop:
      watch:
        - action: rebuild
          path: ./apps/pdf-engine

  # Database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=openpdf
      - POSTGRES_PASSWORD=openpdf
      - POSTGRES_DB=openpdf
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - open-pdf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpdf"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - open-pdf-network

  # Message Queue
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - open-pdf-network

  # Object Storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=openpdf
      - MINIO_ROOT_PASSWORD=openpdf123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - open-pdf-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  open-pdf-network:
    driver: bridge
